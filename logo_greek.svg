<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140" width="400" height="140">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&amp;family=Inter:wght@600&amp;display=swap');
    </style>
  </defs>
  
  <!-- Gold background -->
  <rect x="0" y="0" width="400" height="140" fill="#f5c500" rx="0"/>
  
  <!-- Top hazard stripe -->
  <pattern id="hazard" patternUnits="userSpaceOnUse" width="20" height="12" patternTransform="rotate(0)">
    <rect width="10" height="12" fill="#1a1a3e"/>
    <rect x="10" width="10" height="12" fill="#f5c500"/>
  </pattern>
  <rect x="0" y="0" width="400" height="12" fill="url(#hazard)"/>
  
  <!-- Bottom hazard stripe -->
  <rect x="0" y="128" width="400" height="12" fill="url(#hazard)"/>
  
  <!-- Construction building icon -->
  <g transform="translate(40, 30)">
    <!-- Building outline -->
    <rect x="0" y="15" width="65" height="70" fill="#1a1a3e" rx="2"/>
    <!-- Π (Pi) shape cutout - pillars and beam -->
    <rect x="10" y="25" width="12" height="50" fill="#f5c500"/>
    <rect x="43" y="25" width="12" height="50" fill="#f5c500"/>
    <rect x="10" y="25" width="45" height="10" fill="#f5c500"/>
    <!-- Roof/top accent -->
    <polygon points="32.5,5 65,15 0,15" fill="#1a1a3e"/>
  </g>
  
  <!-- Company name in Greek script -->
  <text x="125" y="75" font-family="'Dancing Script', cursive" font-size="36" font-weight="700" fill="#1a1a1a">Πασχαλίδης</text>
  
  <!-- Subline -->
  <text x="125" y="100" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#1a1a3e" letter-spacing="3">ΤΕΧΝΙΚΗ ΕΤΑΙΡΕΙΑ</text>
</svg>
